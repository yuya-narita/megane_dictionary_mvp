<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>メガネ辞書 MVP</title>
  <link rel="stylesheet" href="./style.css?v=17" />
</head>
<body class="mode-dictionary">
  <main id="app" class="app">
    <header class="topbar">
      <button id="prevWord" class="ghost">←</button>
      <div class="brand">MEGANE DICTIONARY</div>
      <button id="nextWord" class="ghost">→</button>
    </header>

    <nav class="mode-toggle" id="modeToggle">
      <button id="dictionaryMode" class="mode active">辞書</button>
      <button id="cardMode" class="mode">カード</button>
    </nav>

    <section id="card" class="card" aria-live="polite">
      <div id="content" class="content">
        <div class="hint" id="hint">左右：単語 / 上下：メガネ / 長押し：一覧</div>

        <div id="dictionaryView" class="dictionary-view">
          <div id="glassName" class="glass-name"></div>
          <div id="character" class="character"></div>
          <h1 id="word" class="word"></h1>
          <p id="translation" class="translation"></p>
        </div>

        <div id="bugCardView" class="bug-card-view" hidden>
          <div id="flipCard" class="flip-card">
            <img id="deckLayer1" class="deck-layer deck-layer-1" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <img id="deckLayer2" class="deck-layer deck-layer-2" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <img id="deckLayer3" class="deck-layer deck-layer-3" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <div class="flip-inner">
              <div class="flip-face flip-front">
                <img id="cardImage" class="bug-card-image" alt="" />
              </div>
              <div class="flip-face flip-back">
                <img id="cardBackImage" class="bug-card-image" alt="" />
              </div>
            </div>
          </div>
          <div id="cardTitle" class="bug-card-title"></div>
          <div id="cardSubtitle" class="bug-card-subtitle"></div>
          <div id="cardCaption" class="bug-card-caption"></div>
        </div>

        <div id="counter" class="counter"></div>
      </div>
    </section>

    <footer class="controls">
      <button id="prevGlass">前のメガネ</button>
      <button id="randomWord">ランダム</button>
      <button id="nextGlass">次のメガネ</button>
    </footer>

    <dialog id="glassDialog" class="dialog">
      <h2>メガネを選ぶ</h2>
      <div id="glassList" class="glass-list"></div>
      <button id="closeDialog" class="close">閉じる</button>
    </dialog>
  </main>

  <script src="./app.js?v=17"></script>
</body>
</html>
